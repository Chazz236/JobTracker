services:
  db:
    image: postgres:17
    container_name: jobtracker-db
    environment:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker_hush
      POSTGRES_DB: jobtracker
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
  backend:
    build: ./backend
    container_name: jobtracker-api
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobtracker
      SPRING_DATASOURCE_USERNAME: jobtracker
      SPRING_DATASOURCE_PASSWORD: jobtracker_hush
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: jobtracker-ui
    ports:
      - 5173:5173
    stdin_open: true
    tty: true
    depends_on:
      - backend    

volumes:
  postgres-data: